name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, queued (no cancel-in-progress so an
# in-flight deploy can finish before the next build replaces it).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          # Auto-derived from the repo metadata so this same workflow keeps
          # working after a fork or rename — no code changes required.
          BASE_URL: /${{ github.event.repository.name }}/
          ORIGIN: https://${{ github.repository_owner }}.github.io
        run: npm run build

      # Vite's `base: /<repo>/` makes the build output land in
      # `dist/<repo>/...`. Upload that subdirectory so URLs line up.
      - name: Disable Jekyll
        run: touch dist/${{ github.event.repository.name }}/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/${{ github.event.repository.name }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
